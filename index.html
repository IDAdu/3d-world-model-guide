# 开场:AI 距离能帮我倒一杯水,有多远?

过去几年,AI 的表现让人眼花缭乱:写文章、画画、作曲、写代码、陪你聊到深夜……但如果你让它干一件三岁小孩都会的事——**"去,帮我倒杯水"**——全世界最先进的机器人都可能当场露馅:走到桌边碰倒椅子,伸手抓了个空,好不容易握住杯子又捏得太紧,倒水时洒了一半。

为什么会这样?因为**聊天和干活是两码事**。写诗只需要处理文字;倒水却要求 AI 真正理解眼前这个立体世界:杯子在哪、离手多远、有多重、倾斜多少度水会流出来、洒了会流到哪里。这些你不假思索就知道的事,恰恰是今天的 AI 最不会的。

它缺的是两样东西:

- 一双**看懂立体世界的"眼睛"**——知道东西在哪、什么形状、离多远;
- 一个**能预演后果的"脑子"**——动手之前,先在脑内把结果"过一遍"。

先说"脑子"是什么感觉:

> **打个比方**:一个熟练的司机看到前面有个球滚到马路上,他脑子里会"闪过"一个画面——球后面可能跟着一个追球的小孩。于是他提前减速。他并没有真的撞上去才知道危险,而是**在脑子里预演了一遍**。

# 第一章:AI 学会"做梦"——什么是世界模型

先从那个"能预演的脑子"讲起。AI 研究者给它起了个名字:**世界模型**。

## "世界模型"是什么

**世界模型**是 AI 脑子里的一个"想象引擎"。它让 AI 能够在心里**预演接下来会发生什么**,而不用真的去试。

比如你闭上眼睛,想象自己把桌上的杯子往前推——你几乎能"看见"杯子滑动、到桌边掉下去摔碎。你没有真的推,但你脑子里那个能预测结果的"小宇宙",就是你自己的世界模型。AI 研究者想给机器也装上这么一个。

## 一个会"做梦"的 AI(2018 年的奠基思想)

世界模型的经典思想来自 2018 年一篇著名论文。它的想法是:让 AI 先在脑子里建一个**简化版的小世界**,然后**在这个"梦境"里反复练习**,练熟了再拿到真实环境里用。

> **打个比方**:就像运动员会做"表象训练"——闭上眼在脑海里一遍遍预演比赛动作,不用真的上场就能提升水平。这个 AI 也是先造一个"内心小剧场",在里面练上千万次,再上场。

后续最有名的一个系列叫 **Dreamer**(名字就是"做梦者")。它的最新版 **DreamerV3** 在 2025 年登上了顶级期刊《自然》(Nature),因为它创下一个纪录:**在游戏《我的世界》(Minecraft)里,没有任何人教、没给任何攻略,自己从零摸索出了"挖到钻石"**——这在业内是个多年攻不下的难题,因为它需要一长串正确的步骤环环相扣。它靠的就是在脑内"做梦"预演,大大减少了真实试错的次数。

## 两大门派:是"放电影",还是"抓重点"?

### 门派一:放电影派(生成逼真画面)

这一派主张:世界模型就应该像**放电影一样,把未来会发生的画面一帧帧生成出来**,越逼真越好。

最有名的例子是 OpenAI 的 **Sora**(能根据文字生成以假乱真视频的那个),以及谷歌 DeepMind 的 **Genie**(能凭一张图生成一个你可以像玩游戏一样实时操控的虚拟世界)。甚至有人用这种技术,**不靠传统游戏引擎、纯靠 AI 一帧帧"画",就跑起了一个能玩的《毁灭战士》游戏**。

> **打个比方**:放电影派就像一个想象力极其丰富的说书人,你给个开头,他能绘声绘色地把后面的故事"演"出来,画面精美。

### 门派二:抓重点派(只预测关键要素)

另一派——领头的是 AI 大牛杨立昆(Yann LeCun)——认为放电影是**浪费精力**。他的理由很实在:

> **打个比方**:你开车时要预判前车会不会急刹,你需要在脑子里精确渲染出前车每一片树叶的反光、每一粒尘土吗?当然不用。你只需要抓住"车在减速"这个**关键信息**就够了。放电影派非要把每片树叶都画出来,既费劲又容易画错。

所以这一派(代表作叫 **JEPA / V-JEPA**)主张:别去生成逼真像素,只在脑子里预测**抽象的关键要素**——谁在动、往哪去、会不会撞上。他们认为这样才更接近人脑的运作方式,也更适合用来做决策。两种架构画出来一对比就清楚了:

## 美梦翻车:AI 视频真的"懂"物理吗?

当 Sora 这类视频 AI 生成出水流、碰撞、下落都很逼真的画面时,很多人惊呼:"AI 已经学会物理定律了!"如果这是真的,那"放电影"就是通往世界模型的康庄大道。但事实真是如此吗?这是理解世界模型现状最重要的一个问题。

科学家做了严谨的测试,结论出人意料:**并没有真懂。**

有两组独立的研究,一组用简化的实验场景、一组用几百段真实世界视频,分别去考这些 AI 的"物理"。结果高度一致:

- **它答不好"没见过的情况"。** 在训练时见过的场景里,它表现不错;可一旦换成没见过的组合,错误率暴增,而且**你给它再多数据、把模型做再大,也救不回来**。
- **研究者发现了原因**:这些 AI 其实不是学会了"规律",而是在**"照猫画虎"**——它记住了一大堆见过的画面,遇到新情况就找个最像的模仿一下。这跟真正理解"物体受力会怎么动"是两码事。
- **一个惊人的发现**:画面越逼真,不代表越懂物理。有个测试里,最顶尖的视频模型在物理理解上只拿了 **24 分(满分 100)**。也就是说,**"看起来对"和"真的对"完全是两回事。**

> **打个比方**:这就像一个学生把往年考题的答案全背下来了。考原题他门门满分,你以为他学神;可一换新题型就全懵——因为他从来没真正理解知识点,只是记忆力惊人。

这个发现非常重要。它说明:**光靠"看视频、生成逼真画面",造不出真正靠谱的世界模型。** 想让 AI 的"脑内预演"不出错——球不会凭空消失、小孩不会穿墙、水不会倒着流——它必须真正理解这个世界是**立体的**、物体是**有前后遮挡的**、东西是**会遵守重力和碰撞规律的**。

换句话说:那个"能预演的脑子",必须先有一双**看懂立体世界的眼睛**。接下来两章,我们就去看这双"眼睛"是怎么造出来的——这也是开头说的 AI 缺的第二样东西。

# 第二章:补课之一——让 AI 看懂立体世界

这一章讲**"把真实世界搬进电脑"**:拍几张照片,让电脑还原出一个可以自由旋转、自由走动的立体场景。先从最基本的问题开始。

## "3D 模型"是什么

你在电脑上看到的照片、视频,本质上都是**平的**——它们是"2D"(两个维度:左右、上下)。而现实世界是**立体的**"3D"(三个维度:左右、上下、还有前后深浅)。

所谓 **3D 模型**,就是电脑里存的一个**立体物件或立体场景的数字版本**。比如一把椅子的 3D 模型,你可以在电脑里把它转来转去,从任何角度看,就像它真的摆在你面前一样。游戏里的角色、电影里的特效怪兽、宜家网站上能旋转查看的家具,背后都是 3D 模型。

> **打个比方**:2D 图片就像一张椅子的照片——你只能看到拍照那一刻的那个角度。3D 模型则像椅子本身——你能绕着它走一圈,蹲下来看底部,凑近看扶手。信息量完全不是一个级别。

那么,电脑里到底是**怎么存**一个立体物件的?常见有四种"存法",你可以在下面亲手切换感受一下:

- **网格(Mesh)**:用无数个小三角形拼成物体的"外壳",游戏和电影里最常用;
- **点云(Point Cloud)**:用一大把带颜色的点描出物体表面,激光雷达扫出来的就是这种;
- **体素(Voxel)**:像乐高积木/《我的世界》那样,用小方块一格格堆出来;
- **隐式表示(如 NeRF)**:不存"形状"本身,而是存一个"你问我答"的小神经网络——马上讲到的主角。

知道了怎么"存",下一个问题是怎么"得到"——怎么把真实世界的场景变成电脑里的 3D?这个领域这几年发生了三次大跳跃。

## 第一跳:魔法般的"照片补全"——NeRF(2020 年)

假设你围着一座雕像拍了几十张照片。人来做的话,很难凭这些照片"脑补"出没拍到的角度。但 2020 年出现的一项技术 **NeRF**(神经辐射场)做到了:它能学会这个场景,然后生成任何一个你**没拍过**的新角度的画面,而且以假乱真。

它的原理说起来很妙:NeRF 不是把雕像存成一堆点或一个壳,而是训练一个"小大脑"(神经网络),你问它"空间里这个位置、从这个方向看,是什么颜色、有多不透明?",它就回答你。把无数个这样的问答拼起来,就渲染出一整张图。

> **打个比方**:NeRF 就像一位记忆力超群的画师。你给他看了雕像的几十张照片,他就把整座雕像"记"在脑子里。之后你说"我想看从左上方 45 度的样子",他闭着眼睛就能给你画出来,连光影都对。

**但 NeRF 有个大毛病:太慢了。** 每个像素都要问"小大脑"几十上百次,让这位"画师"学会一个场景,当年要用高级显卡算上一两天;而且每换一个新场景,就得从头再学一遍。这也定义了后面几年大家努力的方向:**又快又好**。

## 第二跳:一堆"彩色棉花糖"——高斯泼溅(2023 年)

2023 年,一个叫 **3D 高斯泼溅**(3D Gaussian Splatting)的方法几乎颠覆了整个领域。它换了个思路:不再用"小大脑"去死记硬背,而是用**几百万个半透明的、带颜色的小斑点**堆出整个场景。

> **打个比方**:如果说 NeRF 是让画师凭记忆作画,那高斯泼溅就像用**无数团彩色的、半透明的棉花糖**去堆出雕像的形状。每团棉花糖有自己的颜色、大小、透明度和位置。远看,这一堆棉花糖拼起来就是一尊栩栩如生的雕像;而且因为它是"实实在在摆在那儿"的东西,电脑渲染起来飞快。

它有多快?NeRF 每秒可能只能生成几张画面(卡顿),而高斯泼溅能做到**每秒一百多张**——也就是丝般顺滑的实时效果,你可以像玩游戏一样在场景里流畅走动。训练时间也从"一两天"缩短到"几分钟"。

代价是它比较"占地方"——存一个场景要好几百兆,不像 NeRF 那么精简。但这个速度上的飞跃太重要了,以至于全世界的研究几乎在一年内集体转向了它。

## 第三跳:一秒钟"看一眼就懂"——前馈式重建(2024–2025 年)

前两种方法,不管快慢,都还得**对着每个新场景现学一遍**。最新的方向更狠:训练一个见多识广的"超级模型",让它**看一眼照片,一秒钟内直接吐出立体结果**,不用现学。

2025 年最亮眼的代表叫 **VGGT**(还拿了计算机视觉顶级会议的最佳论文)。你丢给它几张、甚至几百张照片,它一秒之内就能算出相机在哪、每个像素有多远、整个场景的立体结构——这些活儿以前需要一整套复杂流程慢慢磨。

## 起步:借用"会画画的 AI"来雕刻(2022 年)

你可能玩过文字生成图片的 AI(比如输入一句话就出一张画)。造 3D 的第一个聪明办法,就是**借用**这些会画画的 AI 当"老师"。

做法很巧妙:先捏一团"数字黏土"(一个粗糙的立体形状),然后不停地从各个角度给这团黏土"拍照",拿去问画画 AI:"从这个角度看,像不像一只柯基?"画画 AI 说"鼻子该再翘一点",于是就照着改。转一圈一圈地改,黏土就慢慢变成了一只逼真的立体柯基。这套方法的开山之作叫 **DreamFusion**,那个"边雕边问"的循环在论文里叫 **SDS**(分数蒸馏采样)。

> **打个比方**:就像一个雕刻新手,身边站着一位只会看平面画的老师。新手每雕一刀,就从一个角度拍张照给老师看,老师点评,新手再改。转着圈地反复打磨,最后雕出一个各个角度都像样的作品。

**但这个办法有个著名的搞笑毛病,叫"多脸怪"(Janus 问题)。** 因为那位老师只会一个角度一个角度地看,他不知道"正面已经有一张脸了",结果从背面看的时候他又要求长出一张脸——于是雕出来的柯基,前面一张脸,后面还有一张脸。而且这种"边雕边问"的方式很慢,做一个要几个小时。

## 提速:从"边雕边问"到"直接打印"(2023–2025 年)

为了解决又慢又长多脸的问题,研究者想了很多招:

- **先让老师学会"环视"**:训练画画 AI 一次就生成同一个物体的好几个协调角度,这样就不会长出多余的脸了;
- **干脆不用老师,直接"打印"**:训练一个专门造 3D 的大模型,你给一句话或一张图,它像 3D 打印机一样**直接吐出**成品,几秒钟搞定,不用反复打磨。代表作有 **LRM**(五秒出一个),以及一系列 2024–2025 年的大模型如 **CLAY、TRELLIS、腾讯的混元 3D、TripoSG** 等等。

## 现在到什么程度了

今天,已经有好几个**能直接用的商业产品**(比如 Tripo、Meshy、Rodin 这些网站),普通人上传一张图或打一句话,几十秒就能得到一个立体模型,还能下载下来 3D 打印或放进游戏。这个领域进步之快,可以说"以月为单位"。

> **提醒**:这些公司自己宣传的性能数字(参数多大、快多少倍),往往没有经过独立第三方验证,听听就好,别全当真。

# 第四章:合流——把"立体"装进"想象引擎"

现在,拼图的两块都齐了:第一章讲了 AI 的"脑子"(世界模型)以及它不懂物理的软肋;第二、三章讲了 AI 的"眼睛"(3D 技术)进步有多快。这一章讲**它们怎么合到一起**——这正是全世界最顶尖实验室此刻在做的事,答案在机器人和自动驾驶这些**真的要在物理世界里干活**的场景里最清楚。

| 类型 | 好比是 | 它擅长什么 | 它的短板 |
|---|---|---|---|
| **画面型** | 一个画家 | 生成漂亮逼真的画面给人看 | 不懂立体结构——"楼房从天上看很完美,可你想开车穿过城市,它们就塌了" |
| **仿真型** | 一个物理实验室 | 保证几何、重力、碰撞都真实可靠 | 造起来最难,需要真正的 3D 和物理 |
| **决策型** | 一个军师 | 想清楚"下一步该怎么做" | 需要前两者提供靠谱的世界 |

李飞飞有一句话点破了要害(大意):**"如果说语言是对世界的抽象、画面是世界的投影,那么几何、物理和动态,才是世界本身。"** 换句话说,只会"画得像"是不够的,得真正搞懂立体结构和物理规律,机器人才能真的在现实里干活。

## 在自动驾驶里,这个道理最明显

自动驾驶是世界模型落地最深的地方。车企们让 AI 学会"预演"路况:预测前方几秒钟其他车、行人会怎么动,然后规划自己怎么开。这里也分成两派:

- **一派专注立体结构**:让 AI 直接理解"路上每个方块空间是不是被占了"(专业上叫 **3D 占用栅格,3D Occupancy**),再据此规划。这派天生就懂立体。
- **一派用"放电影"**(比如英国 Wayve 公司的 GAIA 系列):生成逼真的未来路面视频来"预演",还能造出各种罕见的危险场景来给自动驾驶做压力测试。

## 机器人:进步很大,但别被演示视频骗了

机器人也在用世界模型学习抓取、搬运——有的甚至用"看视频学动作"的方式训练。这是很有前景的方向。

但这里要泼一盆冷静的水。**李飞飞本人都坦白说**:过去两年那些惊艳的机器人演示视频,几乎**全是在高度受控的实验室里、用固定的几样物品、做很短的任务**拍出来的。**没有一个**真正达到了现实世界所要求的复杂度和可靠性。所以看到炫酷的机器人视频,不妨多一分清醒。

## 融合正在发生:一个模型,又能画又能算

最激动人心的是,这两条线正在**真的合体**。李飞飞团队 2025 年底推出的产品 **Marble** 就是个例子:你给它一句话或一张图,它生成的虚拟世界**同时输出两样东西**——一份漂亮的画面(供人观看),外加一份看不见的"碰撞骨架"(供物理引擎计算,让东西能真实地碰撞、堆叠)。李飞飞形容这是"**溶解了'画家'和'物理实验室'之间的边界**"。

# 结尾:那么,那杯水到底还有多远?

回到开头的问题。如果你只想记住几句话,就是下面这些:

1. AI 想在物理世界里干活,缺两样东西:**能预演后果的"脑子"(世界模型)**和**看懂立体的"眼睛"(3D 技术)**。前者让它不用真试错就能做决策(就像"动手玩 ①"里那条虚线),后者让它知道杯子在哪、多远、什么形状。

2. "脑子"这条线,AI 已经学会"做梦"(Dreamer 挖到了钻石),但**光靠生成逼真视频并不能真懂物理**——测试证明它只是在"照猫画虎",最顶尖的视频模型物理理解只拿了 24 分。

3. "眼睛"这条线进步飞快:**重建**(拍照搬进电脑)从"算两天"进化到"一秒出结果";**生成**(一句话凭空造 3D)已经是几十秒出货的商业产品。

4. 所以答案是:**"立体"和"想象"正在合体**(Marble、占用栅格自动驾驶都是信号),这被很多人视为人工智能的下一个大前沿。但也要保持清醒——连李飞飞都承认,目前的机器人演示离现实世界的复杂度还差得远。**那杯水,实验室里已经能倒了;倒进你家的杯子而不洒,大概还要等这场"合流"真正完成。**

# 附录:名词小词典

遇到这些词不用怕,这里是"人话翻译":

- **3D / 立体**:有前后深浅的、能转着看的,区别于平面的照片(2D)。
- **3D 模型**:电脑里一个立体物件的数字版本。常见存法:网格(三角形外壳)、点云(一把彩色点)、体素(乐高积木)、隐式表示(问答式神经网络)。
- **世界模型(World Model)**:AI 脑内的"想象/预测引擎",能预演未来、辅助决策。
- **潜在空间 / 要点空间**:把画面压缩后的抽象表示;Dreamer 和 JEPA 都在这个层面做预测,不画像素。
- **Sora / Genie**:两个著名的"放电影派"世界模型,能生成逼真视频或可操控的虚拟世界。
- **JEPA**:"抓重点派"世界模型,主张只预测关键要素、不生成逼真画面。
- **物理理解**:AI 是否真的懂重力、碰撞等规律。目前研究表明,视频 AI 大多**只是看起来懂**。
- **重建**:根据实拍照片,让电脑还原出立体场景。
- **生成**:凭文字或一张图,让 AI 无中生有造出立体物件。
- **NeRF(神经辐射场)**:2020 年的技术,像"记忆力超群的画师",凭几张照片就能补出任意新角度。慢但精致。
- **MLP / 神经网络**:NeRF 里那个"你问我答"的小大脑,输入位置和视角,输出颜色和不透明度。
- **体积渲染**:沿视线把一串采样点的颜色按不透明度加权累加成一个像素(动手玩 ③ 演示的过程)。
- **高斯泼溅**:2023 年的技术,用几百万个"彩色半透明棉花糖"堆出场景。飞快、能实时游走。
- **SDS(分数蒸馏采样)**:早期文生 3D 的"边雕边问"循环——让 2D 画画 AI 当老师,反复点评修改。
- **Janus / 多脸怪问题**:SDS 的著名副作用,生成的物体前后都长脸。
- **前馈式**:不针对每个场景/物体现学,大模型一次前向直接出结果(VGGT、LRM 都是)。
- **3D 占用栅格(Occupancy)**:把空间切成小方格,只回答"每格被什么占着"(动手玩 ⑤ 里的世界)。
- **具身智能 / 机器人**:让 AI 有个身体、能在真实物理世界里行动。世界模型 + 3D 就是为它服务的。

> **最后一句**:这份材料为了好懂做了大量简化,每个比方都不完美,但方向是对的。如果你想深入任何一块,专业版报告里有完整的技术细节和论文出处。

      ctx.strokeStyle = '#c99a3c'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(START.x, START.y);
      ctx.lineTo(START.x + L*Math.cos(a), START.y - L*Math.sin(a)); ctx.stroke(); ctx.lineWidth = 1;
      if (ghost){
        ctx.strokeStyle = 'rgba(63,125,110,0.85)'; ctx.setLineDash([7,6]); ctx.lineWidth = 2;
        ctx.beginPath();
        ghost.path.forEach(function(p,i){ i ? ctx.lineTo(p[0],p[1]) : ctx.moveTo(p[0],p[1]); });
        ctx.stroke(); ctx.setLineDash([]); ctx.lineWidth = 1;
        var e = ghost.path[ghost.path.length-1];
        ctx.strokeStyle = '#3f7d6e';
        ctx.beginPath(); ctx.arc(e[0], e[1], 8, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#3f7d6e'; ctx.font = 'bold 12px sans-serif';
        ctx.fillText('预演落点', e[0], e[1] - 14);
      }
      if (ball){
        ctx.fillStyle = '#b5602f';
        ctx.beginPath(); ctx.arc(ball[0], ball[1], 8, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = '#b5602f';
        ctx.beginPath(); ctx.arc(START.x, START.y, 8, 0, Math.PI*2); ctx.fill();
      }
    }
    document.getElementById('dream-pre').addEventListener('click', function(){
      ghost = simulate(); ball = null;
      msg.textContent = ghost.hit ? '预演:能进!' : '预演:进不了,再调调';
      msg.style.color = ghost.hit ? '#3f7d6e' : '#b5602f';
      drawScene();
    });
    document.getElementById('dream-go').addEventListener('click', function(){
      if (anim) cancelAnimationFrame(anim);
      var r = simulate(), i = 0;
      function step(){
        if (i < r.path.length){
          ball = r.path[i]; i += 2;
          drawScene();
          anim = requestAnimationFrame(step);
        } else {
          msg.textContent = r.hit ? '🎉 真的进了!' : '没进——幸好先预演过了吧?';
          msg.style.color = r.hit ? '#3f7d6e' : '#b5602f';
        }
      }
      step();
    });
    aS.addEventListener('input', function(){ ghost = null; drawScene(); });
    pS.addEventListener('input', function(){ ghost = null; drawScene(); });
    drawScene();
  })();

  /* ---------- demo: occupancy grid ---------- */
  (function(){
    var v = makeViewer('occ-stage', {h:360, camZ:11, camY:4.5, rx:-0.5});
    if (!v) return;
    var CATS = {ground:0x9aa88f, car:0xb5602f, tree:0x3f7d6e, bld:0xc9a35c};
    function category(x, y, z){
      if (Math.abs(x-0.2) < 1.15 && Math.abs(z+1.7) < 0.6 && y < 0.62) return 'car';
      if (Math.abs(x-0.45) < 0.6 && Math.abs(z+1.7) < 0.55 && y < 1.05) return 'car';
      var dx = x+2.6, dz = z-2.2;
      if (dx*dx + dz*dz < 0.12 && y < 1.3) return 'tree';
      var dy = y-1.9;
      if (dx*dx + dy*dy + dz*dz < 0.95) return 'tree';
      if (x > 1.7 && x < 3.9 && z > 0.9 && z < 3.7 && y < 2.7) return 'bld';
      if (y < 0.28) return 'ground';
      return null;
    }
    var meshes = [];
    function build(res){
      meshes.forEach(function(m){ v.group.remove(m); m.geometry.dispose(); m.material.dispose(); });
      meshes = [];
      var size = 8, cs = size/res;
      var lists = {ground:[], car:[], tree:[], bld:[]};
      var ny = Math.ceil(3.2/cs);
      for (var ix = 0; ix < res; ix++)
        for (var iz = 0; iz < res; iz++)
          for (var iy = 0; iy < ny; iy++){
            var x = -size/2 + (ix+0.5)*cs, z = -size/2 + (iz+0.5)*cs, y = (iy+0.5)*cs;
            var cat = category(x, y, z);
            if (cat) lists[cat].push([x, y, z]);
          }
      var total = 0, m4 = new THREE.Matrix4();
      Object.keys(lists).forEach(function(cat){
        var arr = lists[cat];
        total += arr.length;
        if (!arr.length) return;
        var im = new THREE.InstancedMesh(
          new THREE.BoxGeometry(cs*0.9, cs*0.9, cs*0.9),
          new THREE.MeshStandardMaterial({color:CATS[cat], roughness:0.65,
            transparent:cat === 'ground', opacity:cat === 'ground' ? 0.55 : 1}),
          arr.length);
        arr.forEach(function(p, i){ m4.setPosition(p[0], p[1]-1.2, p[2]); im.setMatrixAt(i, m4); });
        v.group.add(im); meshes.push(im);
      });
      var nv = document.getElementById('occ-nv');
      if (nv) nv.textContent = '被占用格子:' + total + ' 个';
    }
    var rS = document.getElementById('occ-res');
    build(+rS.value);
    rS.addEventListener('change', function(){ build(+rS.value); });
    rS.addEventListener('input', function(){ build(+rS.value); });
  })();
})();
</script>
